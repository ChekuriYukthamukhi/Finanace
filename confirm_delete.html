{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-lg fade-in">
            <div class="card-body p-5 text-center">
                <i class="fas fa-exclamation-triangle text-danger fa-5x mb-4"></i>
                <h3>Delete Transaction?</h3>
                <p class="text-muted">This action cannot be undone.</p>
                
                <div class="bg-light p-3 rounded mb-4">
                    <div class="h4">${{ transaction.amount|floatformat:2 }}</div>
                    <div>{{ transaction.description|default:"-" }}</div>
                    <div class="text-muted small">{{ transaction.date|date:"M d, Y" }}</div>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4 me-2">
                        <i class="fas fa-trash me-2"></i>Delete
                    </button>
                    <a href="{% url 'transaction_list' %}" class="btn btn-secondary px-4">
                        <i class="fas fa-times me-2"></i>Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
