{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-lg fade-in">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-wallet text-primary fa-3x"></i>
                    <h3 class="mt-2">Welcome to MoneyMuse!</h3>
                    <p class="text-muted">Login to manage your finances</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                    {% if form.errors %}
                        <div class="alert alert-danger">Invalid credentials</div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
                <hr>
                <div class="text-center">
                    <p class="text-muted">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
